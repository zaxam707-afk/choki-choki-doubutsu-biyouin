<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>チョキチョキ！どうぶつびよういん</title>
<style>
  :root {
    --pink: #ffb6d1;
    --pink-dark: #ff7aa8;
    --cream: #fff5e1;
    --mint: #bef0d8;
    --yellow: #ffe66d;
    --blue: #8ed0ff;
    --brown: #6b4a2b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Comic Sans MS", "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN W4", "M PLUS Rounded 1c", sans-serif;
    background: linear-gradient(180deg, #ffd9e8 0%, #ffe9f1 50%, #fff5e1 100%);
    overflow: hidden; touch-action: none;
    color: #5a3a20;
  }
  #app {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  .scene {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .scene.active { display: flex; }

  /* ---- Title ---- */
  .title-logo {
    font-size: clamp(32px, 7vw, 64px);
    font-weight: 900;
    color: var(--pink-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    text-align: center; line-height: 1.2;
    animation: bounce 1.4s ease-in-out infinite;
    margin-bottom: 8px;
  }
  .title-sub {
    font-size: clamp(14px, 2.5vw, 20px);
    color: #a85c7a; margin-bottom: 40px;
    background: #fff; padding: 6px 16px; border-radius: 999px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-10px) rotate(2deg); }
  }
  .big-button {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 900;
    padding: 18px 48px;
    border: none;
    background: linear-gradient(180deg, #ffe066 0%, #ffb84d 100%);
    color: #6b3a00;
    border-radius: 999px;
    box-shadow: 0 6px 0 #c67a00, 0 10px 20px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    text-shadow: 1px 1px 0 #fff;
  }
  .big-button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #c67a00, 0 4px 8px rgba(0,0,0,0.1);
  }
  .deco {
    position: absolute;
    font-size: 48px;
    opacity: 0.7;
    pointer-events: none;
    animation: float 3s ease-in-out infinite;
  }
  .deco.d1 { top: 8%; left: 10%; animation-delay: 0s; }
  .deco.d2 { top: 14%; right: 12%; animation-delay: 0.5s; }
  .deco.d3 { bottom: 18%; left: 14%; animation-delay: 1s; }
  .deco.d4 { bottom: 12%; right: 16%; animation-delay: 1.5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-10deg); }
    50% { transform: translateY(-14px) rotate(10deg); }
  }

  /* ---- Select ---- */
  .select-title {
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 900;
    color: var(--pink-dark);
    margin-bottom: 20px;
    text-shadow: 2px 2px 0 #fff;
  }
  .animal-grid-wrap {
    width: 100%;
    max-width: 960px;
    max-height: 68vh;
    overflow-y: auto;
    padding: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .animal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
  }
  .animal-card {
    background: #fff;
    border-radius: 24px;
    padding: 12px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.12), 0 10px 20px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.15s;
    display: flex; flex-direction: column; align-items: center;
    border: 4px solid #fff;
  }
  .animal-card:active { transform: scale(0.95); }
  .animal-card:hover { border-color: var(--pink); }
  .animal-thumb {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(40px, 10vw, 72px);
    background: linear-gradient(135deg, #fff0f5, #fffbe6);
    border-radius: 18px;
  }
  .animal-name {
    margin-top: 8px;
    font-size: clamp(14px, 2.5vw, 20px);
    font-weight: 900;
    color: #7a4a60;
  }

  /* ---- Play ---- */
  #play {
    background:
      radial-gradient(ellipse at top, #cceeff 0%, transparent 60%),
      linear-gradient(180deg, #fff3d9 0%, #ffd9e8 100%);
  }
  .stage {
    position: relative;
    width: min(92vw, 92vh, 600px);
    aspect-ratio: 1;
    max-height: 75vh;
  }
  #gameCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border-radius: 32px;
    background: #fff;
    box-shadow: inset 0 0 0 6px #fff, 0 10px 30px rgba(0,0,0,0.15);
    touch-action: none;
    animation: idleBreathe 3.2s ease-in-out infinite;
    transform-origin: 50% 65%;
  }
  @keyframes idleBreathe {
    0%   { transform: translateY(0) rotate(-0.8deg) scale(1); }
    25%  { transform: translateY(-4px) rotate(0.6deg) scale(1.012); }
    50%  { transform: translateY(-6px) rotate(-0.4deg) scale(1.018); }
    75%  { transform: translateY(-3px) rotate(0.8deg) scale(1.01); }
    100% { transform: translateY(0) rotate(-0.8deg) scale(1); }
  }
  /* reactive "kusugutai" wiggle while being shaved */
  #gameCanvas.swiping {
    animation: swipeReact 0.22s ease-in-out infinite;
  }
  @keyframes swipeReact {
    0%   { transform: translate(-3px, -2px) rotate(-1.8deg) scale(1.015); }
    25%  { transform: translate(3px, 1px)   rotate(1.4deg)  scale(1.02); }
    50%  { transform: translate(-2px, 2px)  rotate(-1.0deg) scale(1.018); }
    75%  { transform: translate(2px, -1px)  rotate(1.8deg)  scale(1.022); }
    100% { transform: translate(-3px, -2px) rotate(-1.8deg) scale(1.015); }
  }
  .hud {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between;
    pointer-events: none;
    z-index: 10;
  }
  .timer-wrap {
    background: #fff;
    border-radius: 999px;
    padding: 6px 10px 6px 10px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    min-width: 140px;
  }
  .timer-icon { font-size: 24px; }
  .timer-bar {
    flex: 1; height: 14px;
    background: #f0e0e8; border-radius: 999px; overflow: hidden;
  }
  .timer-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #7ed957, #ffde59, #ff6b6b);
    background-size: 300% 100%; background-position: 0% 0%;
    transition: width 0.2s linear, background-position 0.2s linear;
    border-radius: 999px;
  }
  .goal-wrap {
    background: #fff;
    border-radius: 18px;
    padding: 6px 8px;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
  }
  .goal-label {
    font-size: 10px; font-weight: 900; color: #a85c7a;
  }
  .goal-thumb {
    width: 54px; height: 54px; border-radius: 12px;
    background: linear-gradient(135deg, #fff0f5, #fffbe6);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .cheer {
    position: absolute;
    bottom: 8%;
    font-size: clamp(40px, 8vw, 72px);
    animation: cheerBob 0.8s ease-in-out infinite;
    pointer-events: none;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cheer.left { left: 2%; }
  .cheer.right { right: 2%; animation-delay: 0.4s; }
  .cheer-char { display: inline-block; line-height: 1; }
  .cheer.right .cheer-char { transform: scaleX(-1); }
  @keyframes cheerBob {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-14px) rotate(4deg); }
  }
  .cheer-bubble {
    position: absolute;
    background: #fff;
    padding: 6px 12px;
    border-radius: 16px;
    font-weight: 900;
    font-size: 14px;
    color: var(--pink-dark);
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    bottom: 100%;
    margin-bottom: 6px;
    white-space: nowrap;
    animation: pop 2s ease-in-out infinite;
  }
  @keyframes pop {
    0%, 100% { transform: scale(0.9); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }
  .progress-ring {
    position: absolute;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    background: #fff;
    padding: 8px 20px;
    border-radius: 999px;
    font-weight: 900;
    font-size: 18px;
    color: var(--pink-dark);
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    z-index: 10;
  }
  .exit-button {
    position: absolute;
    bottom: 12px; right: 12px;
    background: #fff;
    border: none;
    width: 48px; height: 48px;
    border-radius: 999px;
    font-size: 22px;
    font-weight: 900;
    color: var(--pink-dark);
    box-shadow: 0 4px 0 rgba(0,0,0,0.12);
    cursor: pointer;
    z-index: 11;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
  }
  .exit-button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }

  /* ---- Countdown overlay ---- */
  .countdown {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(80px, 20vw, 200px);
    font-weight: 900;
    color: var(--pink-dark);
    text-shadow: 4px 4px 0 #fff, 8px 8px 0 rgba(0,0,0,0.1);
    z-index: 100;
    animation: countPop 1s ease-out;
  }
  @keyframes countPop {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ---- Result ---- */
  #result {
    background: linear-gradient(180deg, #fff3d9 0%, #ffd9e8 50%, #d9f0ff 100%);
  }
  .result-title {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 900;
    color: var(--pink-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    animation: bounce 1s ease-in-out infinite;
    margin-bottom: 20px;
    text-align: center;
  }
  .result-animal {
    position: relative;
    width: min(60vw, 60vh, 400px);
    aspect-ratio: 1;
    background: #fff;
    border-radius: 32px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .result-animal canvas {
    width: 100%; height: 100%;
  }
  .stars {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    font-size: clamp(24px, 4vw, 40px);
    animation: twinkle 1.5s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { transform: scale(0.6) rotate(0deg); opacity: 0.4; }
    50% { transform: scale(1.2) rotate(20deg); opacity: 1; }
  }
  .score-badge {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 900;
    color: #7a4a60;
    background: #fff;
    padding: 8px 24px;
    border-radius: 999px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    margin-bottom: 16px;
  }
  .button-row {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .small-button {
    font-size: 18px;
    font-weight: 900;
    padding: 12px 24px;
    border: none;
    background: #fff;
    color: var(--pink-dark);
    border-radius: 999px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    cursor: pointer;
  }
  .small-button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
  .small-button.primary {
    background: linear-gradient(180deg, #ffe066 0%, #ffb84d 100%);
    color: #6b3a00;
    box-shadow: 0 4px 0 #c67a00;
  }

  .sparkle-burst {
    position: absolute;
    pointer-events: none;
    width: 20px; height: 20px;
    font-size: 20px;
    animation: sparkleBurst 0.6s ease-out forwards;
    z-index: 20;
  }
  @keyframes sparkleBurst {
    0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, -40px))) scale(1.2); opacity: 0; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Title Scene -->
  <section id="title" class="scene active">
    <span class="deco d1">✨</span>
    <span class="deco d2">🎀</span>
    <span class="deco d3">💖</span>
    <span class="deco d4">⭐</span>
    <div class="title-logo">チョキチョキ！<br/>どうぶつびよういん</div>
    <div class="title-sub">ゆびで なぞって きれいに しよう！</div>
    <button class="big-button" id="btnStart">▶ スタート</button>
  </section>

  <!-- Select Scene -->
  <section id="select" class="scene">
    <div class="select-title">🐾 きょうの おきゃくさまを えらんでね 🐾</div>
    <div class="animal-grid-wrap">
      <div class="animal-grid" id="animalGrid"></div>
    </div>
    <button class="small-button" id="btnBackTitle" style="margin-top:16px">← もどる</button>
  </section>

  <!-- Play Scene -->
  <section id="play" class="scene">
    <div class="stage" id="stage">
      <div class="hud">
        <div class="timer-wrap">
          <span class="timer-icon">⏰</span>
          <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
        </div>
        <div class="goal-wrap">
          <div class="goal-label">おてほん</div>
          <div class="goal-thumb" id="goalThumb">🐶</div>
        </div>
      </div>
      <canvas id="gameCanvas"></canvas>
      <div class="progress-ring" id="progressText">0%</div>
      <button class="exit-button" id="btnExit" aria-label="ホームに戻る" title="ホームに戻る">🏠</button>
      <div class="cheer left">
        <div class="cheer-bubble">がんばれ！</div>
        <span class="cheer-char">🧑‍🦰</span>
      </div>
      <div class="cheer right">
        <div class="cheer-bubble">そのちょうし！</div>
        <span class="cheer-char">👩‍🦱</span>
      </div>
    </div>
  </section>

  <!-- Result Scene -->
  <section id="result" class="scene">
    <div class="result-title" id="resultTitle">たいへん よくできました！</div>
    <div class="result-animal">
      <canvas id="resultCanvas"></canvas>
      <div class="stars" id="starsLayer"></div>
    </div>
    <div class="score-badge" id="scoreBadge">きれいさ 100%</div>
    <div class="button-row">
      <button class="small-button" id="btnAgain">もういちど</button>
      <button class="small-button primary" id="btnOther">べつの どうぶつ</button>
    </div>
  </section>

</div>

<script>
(() => {
  "use strict";

  // ========= Audio (WebAudio) =========
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playBuzz(duration = 0.06) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180 + Math.random()*40, now);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + duration);
  }
  function playDing(freq = 880) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.4);
  }
  function playFanfare() {
    if (!audioCtx) return;
    [523, 659, 784, 1046].forEach((f, i) => {
      setTimeout(() => playDing(f), i * 120);
    });
  }
  function vibrate(ms) {
    if (navigator.vibrate) { try { navigator.vibrate(ms); } catch(e) {} }
  }

  // ========= Scene management =========
  const scenes = {
    title: document.getElementById('title'),
    select: document.getElementById('select'),
    play: document.getElementById('play'),
    result: document.getElementById('result'),
  };
  function showScene(name) {
    Object.values(scenes).forEach(s => s.classList.remove('active'));
    scenes[name].classList.add('active');
  }

  // ========= Animals =========
  // image-based animals (PNG in assets/)
  const ANIMALS = [
    { id:'shiba',     name:'しばいぬ',       emoji:'🐶', image:'assets/shiba.png',     furColor:'#b85e1e' },
    { id:'tabby',     name:'とらねこ',       emoji:'🐈', image:'assets/tabby.png',     furColor:'#c08038' },
    { id:'monkey',    name:'さる',           emoji:'🐒', image:'assets/monkey.png',    furColor:'#7a4a28' },
    { id:'rabbit',    name:'うさぎ',         emoji:'🐰', image:'assets/rabbit.png',    furColor:'#cfcfcf' },
    { id:'panda',     name:'パンダ',         emoji:'🐼', image:'assets/panda.png',     furColor:'#888888' },
    { id:'lion',      name:'ライオン',       emoji:'🦁', image:'assets/lion.png',      furColor:'#c48a2a' },
    { id:'tiger',     name:'とら',           emoji:'🐯', image:'assets/tiger.png',     furColor:'#c0731a' },
    { id:'red_panda', name:'レッサーパンダ', emoji:'🦝', image:'assets/red_panda.png', furColor:'#a04020' },
    { id:'elephant',  name:'ぞう',           emoji:'🐘', image:'assets/elephant.png', furColor:'#5a6a6a' },
  ];

  // ========= Image preloader =========
  // Bump ASSET_VERSION when assets change to bypass stale browser cache (incl. cached 404s)
  const ASSET_VERSION = 'v3';
  const imageCache = {};
  function loadImage(src) {
    if (imageCache[src]) return imageCache[src];
    const img = new Image();
    img.src = src + '?' + ASSET_VERSION;
    imageCache[src] = img;
    return img;
  }
  ANIMALS.forEach(a => loadImage(a.image));

  // ========= Render selection =========
  const grid = document.getElementById('animalGrid');
  ANIMALS.forEach(a => {
    const card = document.createElement('div');
    card.className = 'animal-card';
    card.innerHTML = `
      <div class="animal-thumb">${a.emoji}</div>
      <div class="animal-name">${a.name}</div>
    `;
    card.addEventListener('click', () => {
      ensureAudio();
      playDing(660);
      startGame(a);
    });
    grid.appendChild(card);
  });

  // ========= Buttons =========
  document.getElementById('btnStart').addEventListener('click', () => {
    ensureAudio();
    playDing(880);
    showScene('select');
  });
  document.getElementById('btnBackTitle').addEventListener('click', () => {
    playDing(520);
    showScene('title');
  });
  document.getElementById('btnAgain').addEventListener('click', () => {
    playDing(700);
    startGame(currentAnimal);
  });
  document.getElementById('btnOther').addEventListener('click', () => {
    playDing(700);
    showScene('select');
  });
  document.getElementById('btnExit').addEventListener('click', () => {
    if (running) {
      running = false;
      cancelAnimationFrame(rafId);
    }
    canvas.classList.remove('swiping');
    playDing(440);
    showScene('title');
  });

  // ========= Drawing the animal =========
  // The "clean" animal is drawn as the background of the canvas.
  // The "fur" is drawn as a mess of fluffy ovals covering the animal.
  // Swiping erases fur via destination-out.

  // ----- color helpers -----
  function hexToRgb(hex) {
    const m = hex.replace('#','').match(/^([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
    if (!m) return {r:200,g:200,b:200};
    return { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) };
  }
  function shade(hex, amt) {
    // amt: -1..1  (neg = darker, pos = lighter)
    const {r,g,b} = hexToRgb(hex);
    const f = amt < 0 ? (1+amt) : 1;
    const w2 = amt > 0 ? amt : 0;
    const toHex = n => Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0');
    return '#' + toHex(r*f + 255*w2) + toHex(g*f + 255*w2) + toHex(b*f + 255*w2);
  }

  function drawCleanAnimal(ctx, w, h, animal) {
    ctx.save();
    // background studio
    const bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#ffeef5');
    bg.addColorStop(0.6, '#fff2e2');
    bg.addColorStop(1, '#ffe4c4');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    ctx.fillStyle = '#f0c588';
    ctx.fillRect(0, h * 0.80, w, h * 0.20);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    for (let i = 1; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo((i / 6) * w, h * 0.80);
      ctx.lineTo((i / 6) * w, h);
      ctx.stroke();
    }

    const cx = w / 2;
    const cy = h * 0.55;
    ctx.fillStyle = 'rgba(0,0,0,0.14)';
    ctx.beginPath();
    ctx.ellipse(cx, h * 0.84, Math.min(w, h) * 0.32, Math.min(w, h) * 0.04, 0, 0, Math.PI * 2);
    ctx.fill();

    const img = loadImage(animal.image);
    const targetSize = Math.min(w, h) * 0.78;
    let halfW = targetSize / 2;
    let halfH = targetSize / 2;

    if (img.complete && img.naturalWidth > 0) {
      const r = img.naturalWidth / img.naturalHeight;
      let dw, dh;
      if (r > 1) { dw = targetSize; dh = targetSize / r; }
      else       { dh = targetSize; dw = targetSize * r; }
      halfW = dw / 2; halfH = dh / 2;
      ctx.drawImage(img, cx - halfW, cy - halfH, dw, dh);
    } else {
      ctx.fillStyle = '#eaeaea';
      ctx.beginPath();
      ctx.ellipse(cx, cy, targetSize / 2, targetSize / 2 * 0.85, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#888';
      ctx.font = 'bold ' + Math.round(targetSize * 0.22) + 'px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(animal.emoji || '?', cx, cy);

      // late-load recovery: retry once the image (or a fresh fetch) is ready
      if (img.naturalWidth === 0) {
        const retry = new Image();
        retry.crossOrigin = 'anonymous';
        retry.onload = () => {
          imageCache[animal.image] = retry;
          if (currentAnimal && currentAnimal.id === animal.id && cleanCtx === ctx) {
            // wipe the placeholder area and redraw the image properly
            const r2 = retry.naturalWidth / retry.naturalHeight;
            let dw, dh;
            if (r2 > 1) { dw = targetSize; dh = targetSize / r2; }
            else        { dh = targetSize; dw = targetSize * r2; }
            // clear the placeholder oval
            ctx.save();
            ctx.fillStyle = '#fff5e1';
            ctx.beginPath();
            ctx.ellipse(cx, cy, targetSize / 2 + 4, targetSize / 2 * 0.85 + 4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
            ctx.drawImage(retry, cx - dw / 2, cy - dh / 2, dw, dh);
            if (typeof compose === 'function') compose();
          }
        };
        // cache-bust to bypass any previously cached 404
        retry.src = animal.image + '?v=' + Date.now();
      }
    }

    ctx.restore();
    return { cx, cy, halfW, halfH };
  }

  // Build a dilated/feathered silhouette mask from the animal image
  function buildSilhouetteMask(w, h, img, cx, cy, halfW, halfH) {
    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = w; maskCanvas.height = h;
    const mctx = maskCanvas.getContext('2d');

    const ratio = img.naturalWidth / img.naturalHeight;
    let dw, dh;
    if (ratio > 1) { dw = halfW * 2; dh = (halfW * 2) / ratio; }
    else           { dh = halfH * 2; dw = (halfH * 2) * ratio; }

    const dilate = Math.min(halfW, halfH) * 0.10;
    for (let i = 0; i < 32; i++) {
      const ang = (i / 32) * Math.PI * 2;
      const dist = dilate * (0.55 + Math.random() * 0.45);
      mctx.drawImage(img, cx - dw / 2 + Math.cos(ang) * dist, cy - dh / 2 + Math.sin(ang) * dist, dw, dh);
    }
    if ('filter' in mctx) {
      mctx.filter = 'blur(' + Math.max(2, Math.min(halfW, halfH) * 0.012) + 'px)';
    }
    mctx.drawImage(img, cx - dw / 2, cy - dh / 2, dw, dh);
    mctx.filter = 'none';
    return { maskCanvas, mctx };
  }

  // Draw fur strictly within the animal silhouette (with shaggy overshoot)
  function drawFurLayer(ctx, w, h, animal, geom) {
    const { cx, cy, halfW, halfH } = geom;
    const img = loadImage(animal.image);
    ctx.save();

    let positions = [];
    let maskCanvas = null;

    if (img.complete && img.naturalWidth > 0) {
      const built = buildSilhouetteMask(w, h, img, cx, cy, halfW, halfH);
      maskCanvas = built.maskCanvas;
      const mctx = built.mctx;
      try {
        const mData = mctx.getImageData(0, 0, w, h).data;
        const step = Math.max(2, Math.floor(Math.min(halfW, halfH) / 70));
        for (let py = 0; py < h; py += step) {
          for (let px = 0; px < w; px += step) {
            if (mData[(py * w + px) * 4 + 3] > 100) {
              positions.push(px, py);
            }
          }
        }
      } catch (e) {
        positions = [];
      }
    }

    const minDim = Math.min(halfW, halfH);

    if (positions.length > 0) {
      const N = positions.length / 2; // each position is 2 entries (x,y)
      // Aim for very dense coverage — many puffs per silhouette sample point
      const puffTarget = Math.min(2400, Math.max(1200, Math.floor(N * 1.2)));

      // Layer 1: base fur color, lots of overlapping puffs
      ctx.fillStyle = animal.furColor;
      for (let i = 0; i < puffTarget; i++) {
        const j = ((Math.random() * N) | 0) * 2;
        const px = positions[j];
        const py = positions[j + 1];
        const ox = (Math.random() - 0.5) * minDim * 0.05;
        const oy = (Math.random() - 0.5) * minDim * 0.05;
        const pr = (0.035 + Math.random() * 0.08) * minDim;
        ctx.globalAlpha = 0.7 + Math.random() * 0.3;
        ctx.beginPath();
        ctx.arc(px + ox, py + oy, pr, 0, Math.PI * 2);
        ctx.fill();
      }

      // Layer 2: darker matted texture
      ctx.fillStyle = '#3a2418';
      ctx.globalAlpha = 0.3;
      const dirtCount = Math.min(400, Math.floor(puffTarget / 6));
      for (let i = 0; i < dirtCount; i++) {
        const j = ((Math.random() * N) | 0) * 2;
        const px = positions[j];
        const py = positions[j + 1];
        ctx.beginPath();
        ctx.arc(px + (Math.random() - 0.5) * 8, py + (Math.random() - 0.5) * 8, 3 + Math.random() * 5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    } else {
      // Fallback (image not ready): broad ellipse fur
      ctx.fillStyle = animal.furColor;
      for (let i = 0; i < 600; i++) {
        const a = Math.random() * Math.PI * 2;
        const r = Math.sqrt(Math.random());
        const x = cx + Math.cos(a) * r * halfW * 1.1;
        const y = cy + Math.sin(a) * r * halfH * 1.1;
        const pr = (0.05 + Math.random() * 0.1) * minDim;
        ctx.globalAlpha = 0.7 + Math.random() * 0.3;
        ctx.beginPath();
        ctx.arc(x, y, pr, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    // Final clip to dilated silhouette
    if (maskCanvas) {
      ctx.globalCompositeOperation = 'destination-in';
      ctx.drawImage(maskCanvas, 0, 0);
    }

    ctx.restore();
  }

  // ========= Game state =========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const timerFill = document.getElementById('timerFill');
  const progressText = document.getElementById('progressText');
  const goalThumb = document.getElementById('goalThumb');

  let furCanvas, furCtx;      // offscreen canvas containing messy fur
  let cleanCanvas, cleanCtx;  // offscreen containing the clean animal
  let geom = null;
  let totalFurPixels = 0;
  let erasedPixels = 0;
  let currentAnimal = null;
  let timeLeft = 0;
  let gameDuration = 30; // seconds
  let running = false;
  let rafId = null;
  let lastTs = 0;

  function sizeCanvas() {
    const rect = stage.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
  }

  function setupGameCanvases(animal, done) {
    sizeCanvas();
    const w = canvas.width, h = canvas.height;
    const img = loadImage(animal.image);

    function build() {
      cleanCanvas = document.createElement('canvas');
      cleanCanvas.width = w; cleanCanvas.height = h;
      cleanCtx = cleanCanvas.getContext('2d');
      geom = drawCleanAnimal(cleanCtx, w, h, animal);

      furCanvas = document.createElement('canvas');
      furCanvas.width = w; furCanvas.height = h;
      furCtx = furCanvas.getContext('2d');
      drawFurLayer(furCtx, w, h, animal, geom);

      const imgData = furCtx.getImageData(0, 0, w, h).data;
      let count = 0;
      const step = 16;
      for (let i = 3; i < imgData.length; i += 4 * step) {
        if (imgData[i] > 20) count++;
      }
      totalFurPixels = count;
      erasedPixels = 0;

      compose();
      if (done) done();
    }

    if (img.complete && img.naturalWidth > 0) {
      build();
    } else {
      // wait for image, but cap at 4s so a missing file falls through to placeholder
      let settled = false;
      const finish = () => { if (settled) return; settled = true; build(); };
      img.addEventListener('load', finish, { once: true });
      img.addEventListener('error', finish, { once: true });
      setTimeout(finish, 4000);
    }
  }

  function compose() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(cleanCanvas, 0, 0);
    ctx.drawImage(furCanvas, 0, 0);
  }

  function computeProgress() {
    // Sample fur canvas to estimate remaining fur
    const w = furCanvas.width, h = furCanvas.height;
    const imgData = furCtx.getImageData(0, 0, w, h).data;
    let remaining = 0;
    const step = 16;
    for (let i = 3; i < imgData.length; i += 4 * step) {
      if (imgData[i] > 20) remaining++;
    }
    const cleanedRatio = totalFurPixels > 0
      ? Math.max(0, Math.min(1, 1 - remaining / totalFurPixels))
      : 0;
    return cleanedRatio;
  }

  // Erase fur on swipe
  function eraseAt(x, y) {
    // Convert CSS coords to canvas coords
    const rect = canvas.getBoundingClientRect();
    const scaleX = furCanvas.width / rect.width;
    const scaleY = furCanvas.height / rect.height;
    const cx = (x - rect.left) * scaleX;
    const cy = (y - rect.top) * scaleY;

    const radius = Math.min(furCanvas.width, furCanvas.height) * 0.06;
    furCtx.save();
    furCtx.globalCompositeOperation = 'destination-out';
    furCtx.beginPath();
    furCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    furCtx.fill();
    furCtx.restore();
  }

  function sparkleAt(clientX, clientY) {
    const stageRect = stage.getBoundingClientRect();
    const x = clientX - stageRect.left;
    const y = clientY - stageRect.top;
    const emojis = ['✨','⭐','💖','🌟'];
    const s = document.createElement('div');
    s.className = 'sparkle-burst';
    s.textContent = emojis[(Math.random()*emojis.length)|0];
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    const ang = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 30;
    s.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
    s.style.setProperty('--dy', (Math.sin(ang) * dist - 20) + 'px');
    stage.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }

  // Pointer handling
  let pointerDown = false;
  let lastX = 0, lastY = 0;
  let lastBuzz = 0;
  let lastSparkle = 0;

  function onPointerDown(e) {
    if (!running) return;
    pointerDown = true;
    canvas.classList.add('swiping');
    ensureAudio();
    const p = getPoint(e);
    lastX = p.x; lastY = p.y;
    handleMove(p);
    e.preventDefault();
  }
  function onPointerMove(e) {
    if (!running || !pointerDown) return;
    const p = getPoint(e);
    // interpolate between lastX,lastY and p for smoother strokes
    const dx = p.x - lastX, dy = p.y - lastY;
    const dist = Math.hypot(dx, dy);
    const steps = Math.max(1, Math.floor(dist / 8));
    for (let i = 1; i <= steps; i++) {
      const ix = lastX + (dx * i) / steps;
      const iy = lastY + (dy * i) / steps;
      eraseAt(ix, iy);
    }
    handleMove(p);
    lastX = p.x; lastY = p.y;
    e.preventDefault();
  }
  function onPointerUp() {
    pointerDown = false;
    canvas.classList.remove('swiping');
  }
  function handleMove(p) {
    const now = performance.now();
    if (now - lastBuzz > 50) {
      playBuzz(0.04);
      vibrate(12);
      lastBuzz = now;
    }
    if (now - lastSparkle > 60) {
      sparkleAt(p.clientX, p.clientY);
      lastSparkle = now;
    }
    compose();
  }
  function getPoint(e) {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY, clientX: t.clientX, clientY: t.clientY };
  }

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  window.addEventListener('touchend', onPointerUp);
  window.addEventListener('touchcancel', onPointerUp);

  // ========= Game loop =========
  function startGame(animal) {
    currentAnimal = animal;
    goalThumb.textContent = animal.emoji;
    showScene('play');
    // wait a frame so the canvas has size, then setup (waits for image), then countdown
    requestAnimationFrame(() => {
      setupGameCanvases(animal, () => {
        showCountdown(() => {
          running = true;
          timeLeft = gameDuration;
          lastTs = performance.now();
          tick();
        });
      });
    });
  }

  function showCountdown(done) {
    const stageEl = stage;
    const overlay = document.createElement('div');
    overlay.className = 'countdown';
    stageEl.appendChild(overlay);
    const seq = ['3','2','1','スタート！'];
    let i = 0;
    function next() {
      if (i >= seq.length) {
        overlay.remove();
        done();
        return;
      }
      overlay.textContent = seq[i];
      overlay.style.animation = 'none';
      overlay.offsetHeight;
      overlay.style.animation = '';
      playDing(i === seq.length - 1 ? 1046 : 660);
      i++;
      setTimeout(next, 600);
    }
    next();
  }

  function tick() {
    if (!running) return;
    const now = performance.now();
    const dt = (now - lastTs) / 1000;
    lastTs = now;
    timeLeft -= dt;

    // update progress every ~200ms
    if (!tick._pAcc || now - tick._pAcc > 200) {
      tick._pAcc = now;
      const r = computeProgress();
      progressText.textContent = Math.round(r * 100) + '%';
      const pct = Math.max(0, Math.min(1, timeLeft / gameDuration));
      timerFill.style.width = (pct * 100) + '%';
      timerFill.style.backgroundPosition = ((1 - pct) * 100) + '% 0%';
      if (r >= 1.0) {
        running = false;
        endGame(true);
        return;
      }
    }

    if (timeLeft <= 0) {
      running = false;
      endGame(false);
      return;
    }
    rafId = requestAnimationFrame(tick);
  }

  function endGame(clearedEarly = false) {
    cancelAnimationFrame(rafId);
    const r = computeProgress();
    const pct = Math.round(r * 100);

    // draw the current state to the result canvas
    const resCanvas = document.getElementById('resultCanvas');
    resCanvas.width = canvas.width;
    resCanvas.height = canvas.height;
    const rctx = resCanvas.getContext('2d');
    rctx.drawImage(cleanCanvas, 0, 0);
    rctx.drawImage(furCanvas, 0, 0);

    // title by score
    const title = document.getElementById('resultTitle');
    const scoreBadge = document.getElementById('scoreBadge');
    scoreBadge.textContent = 'きれいさ ' + pct + '%';
    // CLEAR is reserved for 100%. Otherwise show encouraging "almost / keep trying" messages.
    if (clearedEarly || pct >= 100) {
      title.textContent = 'ぜんぶ ピカピカ！すごい！';
      playFanfare();
    } else if (pct >= 80) {
      title.textContent = 'もうすこしで かんぺき！';
      playDing(784); setTimeout(()=>playDing(988), 150);
    } else if (pct >= 50) {
      title.textContent = 'じょうず！もうちょっと！';
      playDing(660); setTimeout(()=>playDing(784), 150);
    } else {
      title.textContent = 'もうちょっと がんばろう！';
      playDing(523);
    }

    // stars overlay
    const stars = document.getElementById('starsLayer');
    stars.innerHTML = '';
    for (let i = 0; i < 14; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = ['✨','⭐','💖','🌟'][i % 4];
      s.style.left = (Math.random() * 90 + 2) + '%';
      s.style.top = (Math.random() * 90 + 2) + '%';
      s.style.animationDelay = (Math.random() * 1.5) + 's';
      stars.appendChild(s);
    }

    showScene('result');
  }

  // Resize handling
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (scenes.play.classList.contains('active') && currentAnimal) {
        // simple approach: redo canvases (loses current erase state — acceptable for demo)
        setupGameCanvases(currentAnimal);
      }
    }, 150);
  });

  // Prevent scrolling on iOS
  document.addEventListener('touchmove', (e) => {
    if (scenes.play.classList.contains('active')) e.preventDefault();
  }, { passive: false });

})();
</script>
</body>
</html>
