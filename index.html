<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>チョキチョキ！どうぶつびよういん</title>
<style>
  :root {
    --pink: #ffb6d1;
    --pink-dark: #ff7aa8;
    --cream: #fff5e1;
    --mint: #bef0d8;
    --yellow: #ffe66d;
    --blue: #8ed0ff;
    --brown: #6b4a2b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: "Comic Sans MS", "Hiragino Maru Gothic ProN", "ヒラギノ丸ゴ ProN W4", "M PLUS Rounded 1c", sans-serif;
    background: linear-gradient(180deg, #ffd9e8 0%, #ffe9f1 50%, #fff5e1 100%);
    overflow: hidden; touch-action: none;
    color: #5a3a20;
  }
  #app {
    position: relative;
    width: 100vw; height: 100vh;
    overflow: hidden;
  }
  .scene {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 16px;
  }
  .scene.active { display: flex; }

  /* ---- Title ---- */
  .title-logo {
    font-size: clamp(32px, 7vw, 64px);
    font-weight: 900;
    color: var(--pink-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    text-align: center; line-height: 1.2;
    animation: bounce 1.4s ease-in-out infinite;
    margin-bottom: 8px;
  }
  .title-sub {
    font-size: clamp(14px, 2.5vw, 20px);
    color: #a85c7a; margin-bottom: 40px;
    background: #fff; padding: 6px 16px; border-radius: 999px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.08);
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50% { transform: translateY(-10px) rotate(2deg); }
  }
  .big-button {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 900;
    padding: 18px 48px;
    border: none;
    background: linear-gradient(180deg, #ffe066 0%, #ffb84d 100%);
    color: #6b3a00;
    border-radius: 999px;
    box-shadow: 0 6px 0 #c67a00, 0 10px 20px rgba(0,0,0,0.15);
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    text-shadow: 1px 1px 0 #fff;
  }
  .big-button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #c67a00, 0 4px 8px rgba(0,0,0,0.1);
  }
  .deco {
    position: absolute;
    font-size: 48px;
    opacity: 0.7;
    pointer-events: none;
    animation: float 3s ease-in-out infinite;
  }
  .deco.d1 { top: 8%; left: 10%; animation-delay: 0s; }
  .deco.d2 { top: 14%; right: 12%; animation-delay: 0.5s; }
  .deco.d3 { bottom: 18%; left: 14%; animation-delay: 1s; }
  .deco.d4 { bottom: 12%; right: 16%; animation-delay: 1.5s; }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(-10deg); }
    50% { transform: translateY(-14px) rotate(10deg); }
  }

  /* ---- Select ---- */
  .select-title {
    font-size: clamp(20px, 4vw, 32px);
    font-weight: 900;
    color: var(--pink-dark);
    margin-bottom: 20px;
    text-shadow: 2px 2px 0 #fff;
  }
  .animal-grid-wrap {
    width: 100%;
    max-width: 960px;
    max-height: 68vh;
    overflow-y: auto;
    padding: 8px;
    -webkit-overflow-scrolling: touch;
  }
  .animal-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
  }
  .animal-card {
    background: #fff;
    border-radius: 24px;
    padding: 12px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.12), 0 10px 20px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: transform 0.15s;
    display: flex; flex-direction: column; align-items: center;
    border: 4px solid #fff;
  }
  .animal-card:active { transform: scale(0.95); }
  .animal-card:hover { border-color: var(--pink); }
  .animal-thumb {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(40px, 10vw, 72px);
    background: linear-gradient(135deg, #fff0f5, #fffbe6);
    border-radius: 18px;
  }
  .animal-name {
    margin-top: 8px;
    font-size: clamp(14px, 2.5vw, 20px);
    font-weight: 900;
    color: #7a4a60;
  }

  /* ---- Play ---- */
  #play {
    background:
      radial-gradient(ellipse at top, #cceeff 0%, transparent 60%),
      linear-gradient(180deg, #fff3d9 0%, #ffd9e8 100%);
  }
  .stage {
    position: relative;
    width: min(92vw, 92vh, 600px);
    aspect-ratio: 1;
    max-height: 75vh;
  }
  #gameCanvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    border-radius: 32px;
    background: #fff;
    box-shadow: inset 0 0 0 6px #fff, 0 10px 30px rgba(0,0,0,0.15);
    touch-action: none;
    animation: idleBreathe 3.2s ease-in-out infinite;
    transform-origin: 50% 65%;
  }
  @keyframes idleBreathe {
    0%   { transform: translateY(0) rotate(-0.8deg) scale(1); }
    25%  { transform: translateY(-4px) rotate(0.6deg) scale(1.012); }
    50%  { transform: translateY(-6px) rotate(-0.4deg) scale(1.018); }
    75%  { transform: translateY(-3px) rotate(0.8deg) scale(1.01); }
    100% { transform: translateY(0) rotate(-0.8deg) scale(1); }
  }
  /* reactive "kusugutai" wiggle while being shaved */
  #gameCanvas.swiping {
    animation: swipeReact 0.22s ease-in-out infinite;
  }
  @keyframes swipeReact {
    0%   { transform: translate(-3px, -2px) rotate(-1.8deg) scale(1.015); }
    25%  { transform: translate(3px, 1px)   rotate(1.4deg)  scale(1.02); }
    50%  { transform: translate(-2px, 2px)  rotate(-1.0deg) scale(1.018); }
    75%  { transform: translate(2px, -1px)  rotate(1.8deg)  scale(1.022); }
    100% { transform: translate(-3px, -2px) rotate(-1.8deg) scale(1.015); }
  }
  .hud {
    position: absolute; top: 12px; left: 12px; right: 12px;
    display: flex; justify-content: space-between;
    pointer-events: none;
    z-index: 10;
  }
  .timer-wrap {
    background: #fff;
    border-radius: 999px;
    padding: 6px 10px 6px 10px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    min-width: 140px;
  }
  .timer-icon { font-size: 24px; }
  .timer-bar {
    flex: 1; height: 14px;
    background: #f0e0e8; border-radius: 999px; overflow: hidden;
  }
  .timer-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #7ed957, #ffde59, #ff6b6b);
    background-size: 300% 100%; background-position: 0% 0%;
    transition: width 0.2s linear, background-position 0.2s linear;
    border-radius: 999px;
  }
  .goal-wrap {
    background: #fff;
    border-radius: 18px;
    padding: 6px 8px;
    display: flex; flex-direction: column; align-items: center;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
  }
  .goal-label {
    font-size: 10px; font-weight: 900; color: #a85c7a;
  }
  .goal-thumb {
    width: 54px; height: 54px; border-radius: 12px;
    background: linear-gradient(135deg, #fff0f5, #fffbe6);
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
  }
  .cheer {
    position: absolute;
    bottom: 8%;
    font-size: clamp(40px, 8vw, 72px);
    animation: cheerBob 0.8s ease-in-out infinite;
    pointer-events: none;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .cheer.left { left: 2%; }
  .cheer.right { right: 2%; animation-delay: 0.4s; }
  .cheer-char { display: inline-block; line-height: 1; }
  .cheer.right .cheer-char { transform: scaleX(-1); }
  @keyframes cheerBob {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-14px) rotate(4deg); }
  }
  .cheer-bubble {
    position: absolute;
    background: #fff;
    padding: 6px 12px;
    border-radius: 16px;
    font-weight: 900;
    font-size: 14px;
    color: var(--pink-dark);
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    bottom: 100%;
    margin-bottom: 6px;
    white-space: nowrap;
    animation: pop 2s ease-in-out infinite;
  }
  @keyframes pop {
    0%, 100% { transform: scale(0.9); opacity: 0.8; }
    50% { transform: scale(1.1); opacity: 1; }
  }
  .progress-ring {
    position: absolute;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    background: #fff;
    padding: 8px 20px;
    border-radius: 999px;
    font-weight: 900;
    font-size: 18px;
    color: var(--pink-dark);
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    z-index: 10;
  }

  /* ---- Countdown overlay ---- */
  .countdown {
    position: absolute; inset: 0;
    background: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(80px, 20vw, 200px);
    font-weight: 900;
    color: var(--pink-dark);
    text-shadow: 4px 4px 0 #fff, 8px 8px 0 rgba(0,0,0,0.1);
    z-index: 100;
    animation: countPop 1s ease-out;
  }
  @keyframes countPop {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* ---- Result ---- */
  #result {
    background: linear-gradient(180deg, #fff3d9 0%, #ffd9e8 50%, #d9f0ff 100%);
  }
  .result-title {
    font-size: clamp(32px, 6vw, 56px);
    font-weight: 900;
    color: var(--pink-dark);
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.08);
    animation: bounce 1s ease-in-out infinite;
    margin-bottom: 20px;
    text-align: center;
  }
  .result-animal {
    position: relative;
    width: min(60vw, 60vh, 400px);
    aspect-ratio: 1;
    background: #fff;
    border-radius: 32px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
    margin-bottom: 20px;
    overflow: hidden;
  }
  .result-animal canvas {
    width: 100%; height: 100%;
  }
  .stars {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .star {
    position: absolute;
    font-size: clamp(24px, 4vw, 40px);
    animation: twinkle 1.5s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { transform: scale(0.6) rotate(0deg); opacity: 0.4; }
    50% { transform: scale(1.2) rotate(20deg); opacity: 1; }
  }
  .score-badge {
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 900;
    color: #7a4a60;
    background: #fff;
    padding: 8px 24px;
    border-radius: 999px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
    margin-bottom: 16px;
  }
  .button-row {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center;
  }
  .small-button {
    font-size: 18px;
    font-weight: 900;
    padding: 12px 24px;
    border: none;
    background: #fff;
    color: var(--pink-dark);
    border-radius: 999px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    cursor: pointer;
  }
  .small-button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.1); }
  .small-button.primary {
    background: linear-gradient(180deg, #ffe066 0%, #ffb84d 100%);
    color: #6b3a00;
    box-shadow: 0 4px 0 #c67a00;
  }

  .sparkle-burst {
    position: absolute;
    pointer-events: none;
    width: 20px; height: 20px;
    font-size: 20px;
    animation: sparkleBurst 0.6s ease-out forwards;
    z-index: 20;
  }
  @keyframes sparkleBurst {
    0% { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx, 0px)), calc(-50% + var(--dy, -40px))) scale(1.2); opacity: 0; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Title Scene -->
  <section id="title" class="scene active">
    <span class="deco d1">✨</span>
    <span class="deco d2">🎀</span>
    <span class="deco d3">💖</span>
    <span class="deco d4">⭐</span>
    <div class="title-logo">チョキチョキ！<br/>どうぶつびよういん</div>
    <div class="title-sub">ゆびで なぞって きれいに しよう！</div>
    <button class="big-button" id="btnStart">▶ スタート</button>
  </section>

  <!-- Select Scene -->
  <section id="select" class="scene">
    <div class="select-title">🐾 きょうの おきゃくさまを えらんでね 🐾</div>
    <div class="animal-grid-wrap">
      <div class="animal-grid" id="animalGrid"></div>
    </div>
    <button class="small-button" id="btnBackTitle" style="margin-top:16px">← もどる</button>
  </section>

  <!-- Play Scene -->
  <section id="play" class="scene">
    <div class="stage" id="stage">
      <div class="hud">
        <div class="timer-wrap">
          <span class="timer-icon">⏰</span>
          <div class="timer-bar"><div class="timer-fill" id="timerFill"></div></div>
        </div>
        <div class="goal-wrap">
          <div class="goal-label">おてほん</div>
          <div class="goal-thumb" id="goalThumb">🐶</div>
        </div>
      </div>
      <canvas id="gameCanvas"></canvas>
      <div class="progress-ring" id="progressText">0%</div>
      <div class="cheer left">
        <div class="cheer-bubble">がんばれ！</div>
        <span class="cheer-char">🧑‍🦰</span>
      </div>
      <div class="cheer right">
        <div class="cheer-bubble">そのちょうし！</div>
        <span class="cheer-char">👩‍🦱</span>
      </div>
    </div>
  </section>

  <!-- Result Scene -->
  <section id="result" class="scene">
    <div class="result-title" id="resultTitle">たいへん よくできました！</div>
    <div class="result-animal">
      <canvas id="resultCanvas"></canvas>
      <div class="stars" id="starsLayer"></div>
    </div>
    <div class="score-badge" id="scoreBadge">きれいさ 100%</div>
    <div class="button-row">
      <button class="small-button" id="btnAgain">もういちど</button>
      <button class="small-button primary" id="btnOther">べつの どうぶつ</button>
    </div>
  </section>

</div>

<script>
(() => {
  "use strict";

  // ========= Audio (WebAudio) =========
  let audioCtx = null;
  function ensureAudio() {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  }
  function playBuzz(duration = 0.06) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(180 + Math.random()*40, now);
    gain.gain.setValueAtTime(0.08, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + duration);
  }
  function playDing(freq = 880) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, now);
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(now); osc.stop(now + 0.4);
  }
  function playFanfare() {
    if (!audioCtx) return;
    [523, 659, 784, 1046].forEach((f, i) => {
      setTimeout(() => playDing(f), i * 120);
    });
  }
  function vibrate(ms) {
    if (navigator.vibrate) { try { navigator.vibrate(ms); } catch(e) {} }
  }

  // ========= Scene management =========
  const scenes = {
    title: document.getElementById('title'),
    select: document.getElementById('select'),
    play: document.getElementById('play'),
    result: document.getElementById('result'),
  };
  function showScene(name) {
    Object.values(scenes).forEach(s => s.classList.remove('active'));
    scenes[name].classList.add('active');
  }

  // ========= Animals =========
  // ear:     'droopy' | 'triangle' | 'round' | 'long' | 'pig'
  // accent:  'mask' | 'panda_eye' | 'mane' | 'stripes_body' | 'face_stripes'
  //          | 'fox_face' | 'pig_nose' | 'cow_spots'
  // tail:    'curl' | 'bushy' | 'pompom' | 'straight' | 'short' | 'none'
  const ANIMALS = [
    { id:'corgi',    name:'コーギー',     emoji:'🐶', body:'#f4a259', furColor:'#c67c33', belly:'#fff4e0', ear:'triangle', tail:'curl' },
    { id:'poodle',   name:'プードル',     emoji:'🐩', body:'#f7d6e0', furColor:'#d49cb6', belly:'#fff5f9', ear:'round',    tail:'pompom' },
    { id:'shiba',    name:'しばいぬ',     emoji:'🐕', body:'#e88a46', furColor:'#b85e1e', belly:'#fff4e0', ear:'triangle', tail:'curl',     accent:'mask' },
    { id:'husky',    name:'ハスキー',     emoji:'🐺', body:'#b0bac4', furColor:'#6a757f', belly:'#ffffff', ear:'triangle', tail:'bushy' },
    { id:'maltese',  name:'マルチーズ',   emoji:'🦮', body:'#fff8e7', furColor:'#e6d6b8', belly:'#ffffff', ear:'droopy',   tail:'pompom' },
    { id:'persian',  name:'ペルシャねこ', emoji:'🐱', body:'#ecd8ae', furColor:'#b89a6a', belly:'#fff5e0', ear:'triangle', tail:'bushy' },
    { id:'blackcat', name:'くろねこ',     emoji:'🐈‍⬛', body:'#3d3d3d', furColor:'#1a1a1a', belly:'#5a5a5a', ear:'triangle', tail:'straight' },
    { id:'tabby',    name:'とらねこ',     emoji:'🐈', body:'#d49a5c', furColor:'#a06838', belly:'#fff4e0', ear:'triangle', tail:'straight', accent:'face_stripes' },
    { id:'rabbit',   name:'うさぎ',       emoji:'🐰', body:'#ffffff', furColor:'#dedede', belly:'#fff5f9', ear:'long',     tail:'short',    innerEar:'#ffb6c1' },
    { id:'hamster',  name:'ハムスター',   emoji:'🐹', body:'#e8b87a', furColor:'#b88a48', belly:'#fff4e0', ear:'round',    tail:'short' },
    { id:'bear',     name:'くま',         emoji:'🐻', body:'#a06a3a', furColor:'#6e431c', belly:'#f5dcb8', ear:'round',    tail:'short' },
    { id:'panda',    name:'パンダ',       emoji:'🐼', body:'#ffffff', furColor:'#d5d5d5', belly:'#ffffff', ear:'round',    tail:'short',    accent:'panda_eye', earColor:'#2a2a2a', innerEar:'#2a2a2a' },
    { id:'koala',    name:'コアラ',       emoji:'🐨', body:'#9ea7b3', furColor:'#6b737f', belly:'#dce0e6', ear:'round',    tail:'none',     innerEar:'#d48aa8' },
    { id:'lion',     name:'ライオン',     emoji:'🦁', body:'#f4c16b', furColor:'#c48a2a', belly:'#fff1cf', ear:'triangle', tail:'straight', accent:'mane' },
    { id:'tiger',    name:'とら',         emoji:'🐯', body:'#f2a13a', furColor:'#c0731a', belly:'#fff4e0', ear:'triangle', tail:'straight', accent:'stripes_body' },
    { id:'fox',      name:'きつね',       emoji:'🦊', body:'#f08a4a', furColor:'#c05a20', belly:'#fffcf0', ear:'triangle', tail:'bushy',    accent:'fox_face' },
    { id:'sheep',    name:'ひつじ',       emoji:'🐑', body:'#fffbef', furColor:'#ebe2d0', belly:'#ffffff', ear:'round',    tail:'short' },
    { id:'alpaca',   name:'アルパカ',     emoji:'🦙', body:'#ecdcbe', furColor:'#b89a6a', belly:'#fffaf0', ear:'round',    tail:'short' },
    { id:'pig',      name:'ぶた',         emoji:'🐷', body:'#f8c4cd', furColor:'#d897a0', belly:'#fde4e9', ear:'pig',      tail:'curl',     accent:'pig_nose' },
    { id:'cow',      name:'うし',         emoji:'🐮', body:'#ffffff', furColor:'#e0e0e0', belly:'#ffffff', ear:'round',    tail:'straight', accent:'cow_spots' },
  ];

  // ========= Render selection =========
  const grid = document.getElementById('animalGrid');
  ANIMALS.forEach(a => {
    const card = document.createElement('div');
    card.className = 'animal-card';
    card.innerHTML = `
      <div class="animal-thumb">${a.emoji}</div>
      <div class="animal-name">${a.name}</div>
    `;
    card.addEventListener('click', () => {
      ensureAudio();
      playDing(660);
      startGame(a);
    });
    grid.appendChild(card);
  });

  // ========= Buttons =========
  document.getElementById('btnStart').addEventListener('click', () => {
    ensureAudio();
    playDing(880);
    showScene('select');
  });
  document.getElementById('btnBackTitle').addEventListener('click', () => {
    playDing(520);
    showScene('title');
  });
  document.getElementById('btnAgain').addEventListener('click', () => {
    playDing(700);
    startGame(currentAnimal);
  });
  document.getElementById('btnOther').addEventListener('click', () => {
    playDing(700);
    showScene('select');
  });

  // ========= Drawing the animal =========
  // The "clean" animal is drawn as the background of the canvas.
  // The "fur" is drawn as a mess of fluffy ovals covering the animal.
  // Swiping erases fur via destination-out.

  // ----- color helpers -----
  function hexToRgb(hex) {
    const m = hex.replace('#','').match(/^([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i);
    if (!m) return {r:200,g:200,b:200};
    return { r: parseInt(m[1],16), g: parseInt(m[2],16), b: parseInt(m[3],16) };
  }
  function shade(hex, amt) {
    // amt: -1..1  (neg = darker, pos = lighter)
    const {r,g,b} = hexToRgb(hex);
    const f = amt < 0 ? (1+amt) : 1;
    const w2 = amt > 0 ? amt : 0;
    const toHex = n => Math.max(0,Math.min(255,Math.round(n))).toString(16).padStart(2,'0');
    return '#' + toHex(r*f + 255*w2) + toHex(g*f + 255*w2) + toHex(b*f + 255*w2);
  }

  function drawCleanAnimal(ctx, w, h, animal) {
    ctx.save();

    // ----- Background studio -----
    const bg = ctx.createLinearGradient(0, 0, 0, h);
    bg.addColorStop(0, '#ffeef5');
    bg.addColorStop(0.6, '#fff2e2');
    bg.addColorStop(1, '#ffe4c4');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);
    // floor
    ctx.fillStyle = '#f0c588';
    ctx.fillRect(0, h * 0.80, w, h * 0.20);
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    for (let i = 1; i < 6; i++) {
      ctx.beginPath();
      ctx.moveTo((i / 6) * w, h * 0.80);
      ctx.lineTo((i / 6) * w, h);
      ctx.stroke();
    }

    const cx = w / 2, cy = h * 0.62;
    const bodyR = Math.min(w, h) * 0.23;

    // ----- sketchy ink outline helper -----
    const inkColor = 'rgba(60,35,20,0.55)';
    const inkLW = Math.max(1.6, Math.min(w, h) * 0.0055);
    function inkStroke(pathFn) {
      const offsets = [[0.6, 0.4], [-0.4, 0.5], [0.2, -0.4]];
      ctx.save();
      ctx.strokeStyle = inkColor;
      ctx.lineWidth = inkLW;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      for (const [dx, dy] of offsets) {
        ctx.save(); ctx.translate(dx, dy);
        ctx.beginPath(); pathFn();
        ctx.stroke();
        ctx.restore();
      }
      ctx.restore();
    }
    // radial gradient fill for volume
    function shadedFill(pathFn, baseCol, gcx, gcy, gr) {
      const light = shade(baseCol, 0.18);
      const dark  = shade(baseCol, -0.22);
      const grad = ctx.createRadialGradient(gcx - gr*0.25, gcy - gr*0.3, gr*0.05, gcx, gcy, gr);
      grad.addColorStop(0, light);
      grad.addColorStop(0.6, baseCol);
      grad.addColorStop(1, dark);
      ctx.save();
      ctx.fillStyle = grad;
      ctx.beginPath(); pathFn();
      ctx.fill();
      ctx.restore();
    }

    // shadow under feet
    ctx.fillStyle = 'rgba(0,0,0,0.14)';
    ctx.beginPath();
    ctx.ellipse(cx, h * 0.84, bodyR * 1.4, bodyR * 0.2, 0, 0, Math.PI * 2);
    ctx.fill();

    const ear = animal.ear || 'triangle';
    const earColor = animal.earColor || animal.body;
    const innerEar = animal.innerEar || '#ffb6c1';
    const accent = animal.accent || null;

    // ===== TAIL (behind body) =====
    drawTail();
    function drawTail() {
      const t = animal.tail;
      if (!t || t === 'none') return;
      if (t === 'curl') {
        const p = () => {
          ctx.moveTo(cx + bodyR * 1.08, cy + bodyR * 0.18);
          ctx.bezierCurveTo(cx + bodyR * 1.55, cy + bodyR * 0.05,
                            cx + bodyR * 1.6,  cy - bodyR * 0.45,
                            cx + bodyR * 1.15, cy - bodyR * 0.55);
          ctx.bezierCurveTo(cx + bodyR * 0.85, cy - bodyR * 0.55,
                            cx + bodyR * 0.85, cy - bodyR * 0.25,
                            cx + bodyR * 1.05, cy - bodyR * 0.05);
          ctx.bezierCurveTo(cx + bodyR * 1.15, cy + bodyR * 0.05,
                            cx + bodyR * 1.18, cy + bodyR * 0.15,
                            cx + bodyR * 1.08, cy + bodyR * 0.18);
        };
        shadedFill(p, animal.body, cx + bodyR * 1.2, cy - bodyR * 0.3, bodyR * 0.55);
        inkStroke(p);
        // white tuft for shiba / corgi
        if (accent === 'mask' || animal.id === 'corgi') {
          ctx.fillStyle = animal.belly;
          ctx.beginPath();
          ctx.arc(cx + bodyR * 1.15, cy - bodyR * 0.55, bodyR * 0.2, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (t === 'pompom') {
        const p = () => ctx.arc(cx + bodyR * 1.18, cy - bodyR * 0.2, bodyR * 0.26, 0, Math.PI * 2);
        shadedFill(p, animal.body, cx + bodyR * 1.1, cy - bodyR * 0.3, bodyR * 0.4);
        inkStroke(p);
      } else if (t === 'bushy') {
        const p = () => ctx.ellipse(cx + bodyR * 1.2, cy + bodyR * 0.05, bodyR * 0.4, bodyR * 0.22, -0.45, 0, Math.PI * 2);
        shadedFill(p, animal.body, cx + bodyR * 1.05, cy - bodyR * 0.1, bodyR * 0.5);
        inkStroke(p);
        if (animal.id === 'fox') {
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.arc(cx + bodyR * 1.5, cy - bodyR * 0.15, bodyR * 0.16, 0, Math.PI * 2);
          ctx.fill();
        } else if (animal.id === 'husky') {
          ctx.fillStyle = '#ffffff';
          ctx.beginPath();
          ctx.ellipse(cx + bodyR * 1.4, cy + bodyR * 0.05, bodyR * 0.2, bodyR * 0.12, -0.45, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (t === 'straight') {
        const p = () => ctx.ellipse(cx + bodyR * 1.25, cy + bodyR * 0.1, bodyR * 0.34, bodyR * 0.08, -0.55, 0, Math.PI * 2);
        shadedFill(p, animal.body, cx + bodyR * 1.15, cy + bodyR * 0.05, bodyR * 0.4);
        inkStroke(p);
        if (accent === 'cow_spots' || accent === 'mane') {
          ctx.fillStyle = accent === 'mane' ? '#c48a2a' : '#2b2b2b';
          ctx.beginPath();
          ctx.arc(cx + bodyR * 1.5, cy - bodyR * 0.1, bodyR * 0.13, 0, Math.PI * 2);
          ctx.fill();
        }
      } else if (t === 'short') {
        const p = () => ctx.arc(cx + bodyR * 1.04, cy + bodyR * 0.08, bodyR * 0.14, 0, Math.PI * 2);
        shadedFill(p, animal.body, cx + bodyR, cy, bodyR * 0.2);
        inkStroke(p);
      }
    }

    // ===== BODY (pear shape, sitting) =====
    const bodyPath = () => {
      ctx.moveTo(cx - bodyR * 1.2, cy + bodyR * 0.85);
      ctx.bezierCurveTo(cx - bodyR * 1.45, cy + bodyR * 0.45,
                        cx - bodyR * 1.3,  cy - bodyR * 0.45,
                        cx - bodyR * 0.85, cy - bodyR * 0.75);
      ctx.bezierCurveTo(cx - bodyR * 0.4,  cy - bodyR * 0.9,
                        cx + bodyR * 0.4,  cy - bodyR * 0.9,
                        cx + bodyR * 0.85, cy - bodyR * 0.75);
      ctx.bezierCurveTo(cx + bodyR * 1.3,  cy - bodyR * 0.45,
                        cx + bodyR * 1.45, cy + bodyR * 0.45,
                        cx + bodyR * 1.2,  cy + bodyR * 0.85);
      ctx.closePath();
    };
    shadedFill(bodyPath, animal.body, cx - bodyR * 0.3, cy - bodyR * 0.25, bodyR * 1.7);
    inkStroke(bodyPath);

    // Chest fluff / belly (white puff)
    const bellyPath = () => ctx.ellipse(cx, cy + bodyR * 0.2, bodyR * 0.75, bodyR * 0.7, 0, 0, Math.PI * 2);
    shadedFill(bellyPath, animal.belly, cx - bodyR * 0.1, cy, bodyR * 0.9);

    // Body accents
    if (accent === 'cow_spots') {
      ctx.fillStyle = '#2b2b2b';
      const spots = [[-0.45,-0.3,0.24,0.18],[0.5,0.05,0.22,0.16],[-0.65,0.45,0.18,0.13],[0.3,0.55,0.18,0.13]];
      spots.forEach(([dx,dy,rx,ry])=>{
        ctx.beginPath();
        ctx.ellipse(cx+dx*bodyR, cy+dy*bodyR, rx*bodyR, ry*bodyR, dx*0.5, 0, Math.PI*2);
        ctx.fill();
      });
    } else if (accent === 'stripes_body') {
      ctx.fillStyle = 'rgba(42,26,18,0.78)';
      for (let i = 0; i < 5; i++) {
        const y = cy - bodyR * 0.6 + (i / 4) * bodyR * 1.2;
        const widen = Math.cos(((i / 4) - 0.5) * Math.PI) * 0.9 + 0.15;
        ctx.beginPath();
        ctx.ellipse(cx - bodyR * 0.9, y, bodyR * 0.07, bodyR * 0.15 * widen, -0.1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + bodyR * 0.9, y, bodyR * 0.07, bodyR * 0.15 * widen, 0.1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ===== Front paws =====
    const pawColor = (accent === 'mask') ? animal.belly : animal.body;
    const leftPaw  = () => ctx.ellipse(cx - bodyR * 0.5, cy + bodyR * 0.95, bodyR * 0.23, bodyR * 0.3, 0, 0, Math.PI * 2);
    const rightPaw = () => ctx.ellipse(cx + bodyR * 0.5, cy + bodyR * 0.95, bodyR * 0.23, bodyR * 0.3, 0, 0, Math.PI * 2);
    shadedFill(leftPaw,  pawColor, cx - bodyR * 0.55, cy + bodyR * 0.85, bodyR * 0.4);
    shadedFill(rightPaw, pawColor, cx + bodyR * 0.45, cy + bodyR * 0.85, bodyR * 0.4);
    inkStroke(leftPaw);
    inkStroke(rightPaw);
    // toe marks
    ctx.strokeStyle = 'rgba(80,50,30,0.4)';
    ctx.lineWidth = inkLW * 0.8;
    [cx - bodyR * 0.5, cx + bodyR * 0.5].forEach(px => {
      for (let t = -1; t <= 1; t++) {
        ctx.beginPath();
        ctx.moveTo(px + t * bodyR * 0.08, cy + bodyR * 1.12);
        ctx.lineTo(px + t * bodyR * 0.08, cy + bodyR * 1.2);
        ctx.stroke();
      }
    });

    // ===== HEAD =====
    const headR = bodyR * 0.85;
    const hy = cy - bodyR * 1.05;

    // Mane (lion) — behind head
    if (accent === 'mane') {
      ctx.fillStyle = '#c48a2a';
      for (let i = 0; i < 22; i++) {
        const ang = (i / 22) * Math.PI * 2;
        const rr = headR * 1.4;
        ctx.beginPath();
        ctx.arc(cx + Math.cos(ang) * rr, hy + Math.sin(ang) * rr, headR * 0.3, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#d9a14a';
      ctx.beginPath();
      ctx.arc(cx, hy, headR * 1.22, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ears BEHIND head (round, droopy, long)
    function drawEarRound(side) {
      const sx = cx + side * headR * 0.7;
      const sy = hy - headR * 0.55;
      const p = () => ctx.arc(sx, sy, headR * 0.34, 0, Math.PI * 2);
      ctx.save();
      ctx.fillStyle = earColor;
      ctx.beginPath(); p(); ctx.fill();
      ctx.restore();
      inkStroke(p);
      ctx.fillStyle = innerEar;
      ctx.beginPath(); ctx.arc(sx, sy, headR * 0.17, 0, Math.PI * 2); ctx.fill();
    }
    function drawEarDroopy(side) {
      const sx = cx + side * headR * 0.9;
      const sy = hy + headR * 0.12;
      const p = () => ctx.ellipse(sx, sy, headR * 0.32, headR * 0.6, side * 0.35, 0, Math.PI * 2);
      shadedFill(p, animal.body, sx, sy - headR * 0.2, headR * 0.6);
      inkStroke(p);
      ctx.fillStyle = innerEar;
      ctx.beginPath();
      ctx.ellipse(sx, sy + headR * 0.1, headR * 0.14, headR * 0.34, side * 0.35, 0, Math.PI * 2);
      ctx.fill();
    }
    function drawEarLong(side) {
      const sx = cx + side * headR * 0.35;
      const sy = hy - headR * 1.25;
      const p = () => ctx.ellipse(sx, sy, headR * 0.17, headR * 0.72, side * 0.12, 0, Math.PI * 2);
      shadedFill(p, animal.body, sx, sy, headR * 0.7);
      inkStroke(p);
      ctx.fillStyle = innerEar;
      ctx.beginPath();
      ctx.ellipse(sx, sy + headR * 0.13, headR * 0.08, headR * 0.5, side * 0.12, 0, Math.PI * 2);
      ctx.fill();
    }

    if (ear === 'round')  { drawEarRound(-1);  drawEarRound(1); }
    if (ear === 'droopy') { drawEarDroopy(-1); drawEarDroopy(1); }
    if (ear === 'long')   { drawEarLong(-1);   drawEarLong(1); }

    // Head fill (round)
    const headPath = () => ctx.ellipse(cx, hy, headR, headR * 1.02, 0, 0, Math.PI * 2);
    shadedFill(headPath, animal.body, cx - headR * 0.25, hy - headR * 0.3, headR * 1.3);
    inkStroke(headPath);

    // Face accents
    if (accent === 'fox_face') {
      ctx.fillStyle = animal.belly;
      ctx.beginPath();
      ctx.ellipse(cx, hy + headR * 0.38, headR * 0.58, headR * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();
      // cheek triangles
      ctx.beginPath();
      ctx.moveTo(cx - headR * 0.3, hy);
      ctx.lineTo(cx - headR * 0.55, hy + headR * 0.3);
      ctx.lineTo(cx - headR * 0.25, hy + headR * 0.45);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + headR * 0.3, hy);
      ctx.lineTo(cx + headR * 0.55, hy + headR * 0.3);
      ctx.lineTo(cx + headR * 0.25, hy + headR * 0.45);
      ctx.closePath(); ctx.fill();
    } else if (accent === 'mask') {
      // shiba-style white muzzle + cheeks + brow patches
      ctx.fillStyle = animal.belly;
      // big lower muzzle patch
      ctx.beginPath();
      ctx.ellipse(cx, hy + headR * 0.32, headR * 0.58, headR * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      // cheek blobs
      ctx.beginPath();
      ctx.ellipse(cx - headR * 0.55, hy + headR * 0.15, headR * 0.22, headR * 0.28, -0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + headR * 0.55, hy + headR * 0.15, headR * 0.22, headR * 0.28, 0.2, 0, Math.PI * 2);
      ctx.fill();
      // eyebrow patches (like shiba's above-eye white)
      ctx.beginPath();
      ctx.arc(cx - headR * 0.3, hy - headR * 0.3, headR * 0.12, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + headR * 0.3, hy - headR * 0.3, headR * 0.12, 0, Math.PI * 2);
      ctx.fill();
    } else if (accent === 'panda_eye') {
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath();
      ctx.ellipse(cx - headR * 0.33, hy - headR * 0.02, headR * 0.22, headR * 0.27, -0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + headR * 0.33, hy - headR * 0.02, headR * 0.22, headR * 0.27, 0.35, 0, Math.PI * 2);
      ctx.fill();
    } else if (accent === 'face_stripes') {
      ctx.fillStyle = 'rgba(42,26,18,0.7)';
      for (let i = -1; i <= 1; i++) {
        ctx.beginPath();
        ctx.ellipse(cx + i * headR * 0.28, hy - headR * 0.55, headR * 0.05, headR * 0.17, i * 0.2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.beginPath();
      ctx.ellipse(cx - headR * 0.6, hy - headR * 0.1, headR * 0.05, headR * 0.15, 0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + headR * 0.6, hy - headR * 0.1, headR * 0.05, headR * 0.15, -0.4, 0, Math.PI * 2);
      ctx.fill();
    }

    // Ears IN FRONT of head (triangle, pig)
    function drawEarTriangle(side) {
      const baseX = cx + side * headR * 0.55;
      const baseY = hy - headR * 0.45;
      const tipX  = cx + side * headR * 0.95;
      const tipY  = hy - headR * 1.3;
      const backX = cx + side * headR * 0.15;
      const backY = hy - headR * 0.78;
      const p = () => {
        ctx.moveTo(baseX, baseY);
        ctx.lineTo(tipX, tipY);
        ctx.lineTo(backX, backY);
        ctx.closePath();
      };
      shadedFill(p, earColor, (baseX+backX)/2, (baseY+backY)/2, headR * 0.8);
      inkStroke(p);
      // inner ear (pink)
      ctx.fillStyle = innerEar;
      ctx.beginPath();
      ctx.moveTo(cx + side * headR * 0.5, hy - headR * 0.5);
      ctx.lineTo(cx + side * headR * 0.85, hy - headR * 1.1);
      ctx.lineTo(cx + side * headR * 0.22, hy - headR * 0.78);
      ctx.closePath();
      ctx.fill();
    }
    function drawEarPig(side) {
      const p = () => {
        ctx.moveTo(cx + side * headR * 0.4, hy - headR * 0.55);
        ctx.quadraticCurveTo(cx + side * headR * 0.75, hy - headR * 0.35,
                             cx + side * headR * 0.15, hy - headR * 0.8);
        ctx.closePath();
      };
      shadedFill(p, earColor, cx + side * headR * 0.35, hy - headR * 0.65, headR * 0.5);
      inkStroke(p);
      ctx.fillStyle = innerEar;
      ctx.beginPath();
      ctx.moveTo(cx + side * headR * 0.42, hy - headR * 0.55);
      ctx.quadraticCurveTo(cx + side * headR * 0.68, hy - headR * 0.38,
                           cx + side * headR * 0.2, hy - headR * 0.78);
      ctx.closePath(); ctx.fill();
    }
    if (ear === 'triangle') { drawEarTriangle(-1); drawEarTriangle(1); }
    if (ear === 'pig')      { drawEarPig(-1);      drawEarPig(1); }

    // Horns (cow)
    if (accent === 'cow_spots') {
      const lh = () => ctx.ellipse(cx - headR * 0.85, hy - headR * 0.45, headR * 0.18, headR * 0.09, -0.4, 0, Math.PI * 2);
      const rh = () => ctx.ellipse(cx + headR * 0.85, hy - headR * 0.45, headR * 0.18, headR * 0.09, 0.4, 0, Math.PI * 2);
      shadedFill(lh, '#f5e8a0', cx - headR * 0.9, hy - headR * 0.5, headR * 0.25);
      shadedFill(rh, '#f5e8a0', cx + headR * 0.8, hy - headR * 0.5, headR * 0.25);
      inkStroke(lh); inkStroke(rh);
    }

    // ===== Face features =====
    // Closed drowsy eyes (shiba-style) for most animals; open for panda/tabby/black cat
    const openEye = (accent === 'panda_eye' || animal.id === 'blackcat' || animal.id === 'tabby' || animal.id === 'husky');
    const eyeY = hy - headR * 0.04;
    const eyeOffset = headR * 0.32;
    const eyeR = headR * 0.11;

    if (accent === 'panda_eye') {
      ctx.fillStyle = '#ffffff';
      ctx.beginPath(); ctx.arc(cx - eyeOffset, eyeY, eyeR * 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + eyeOffset, eyeY, eyeR * 0.9, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#2a1a12';
      ctx.beginPath(); ctx.arc(cx - eyeOffset, eyeY, eyeR * 0.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + eyeOffset, eyeY, eyeR * 0.5, 0, Math.PI * 2); ctx.fill();
    } else if (openEye) {
      ctx.fillStyle = '#2a1a12';
      ctx.beginPath();
      ctx.ellipse(cx - eyeOffset, eyeY, eyeR * 0.9, eyeR, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(cx + eyeOffset, eyeY, eyeR * 0.9, eyeR, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // closed drowsy eyes — curved "U" shape
      ctx.strokeStyle = '#3a2418';
      ctx.lineWidth = Math.max(2, headR * 0.055);
      ctx.lineCap = 'round';
      [-1, 1].forEach(side => {
        const ex = cx + side * eyeOffset;
        ctx.beginPath();
        ctx.moveTo(ex - headR * 0.12, eyeY + headR * 0.01);
        ctx.quadraticCurveTo(ex, eyeY - headR * 0.09, ex + headR * 0.12, eyeY + headR * 0.01);
        ctx.stroke();
        // short lash line up
        ctx.beginPath();
        ctx.moveTo(ex + side * headR * 0.14, eyeY - headR * 0.03);
        ctx.lineTo(ex + side * headR * 0.22, eyeY - headR * 0.09);
        ctx.stroke();
      });
    }
    // eye sparkle (only when open)
    if (openEye) {
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(cx - eyeOffset + eyeR * 0.3, eyeY - eyeR * 0.3, eyeR * 0.32, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + eyeOffset + eyeR * 0.3, eyeY - eyeR * 0.3, eyeR * 0.32, 0, Math.PI * 2);
      ctx.fill();
    }

    // Cheek blush
    ctx.fillStyle = 'rgba(255,130,155,0.5)';
    ctx.beginPath();
    ctx.arc(cx - headR * 0.5, hy + headR * 0.28, headR * 0.14, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(cx + headR * 0.5, hy + headR * 0.28, headR * 0.14, 0, Math.PI * 2);
    ctx.fill();

    // Nose
    let noseX = cx, noseY = hy + headR * 0.22;
    let noseColor = '#2a1a12';
    if (accent === 'pig_nose') { noseColor = '#f28aa0'; }
    else if (accent === 'cow_spots') { noseColor = '#f28aa0'; noseY = hy + headR * 0.3; }

    if (accent === 'pig_nose') {
      ctx.fillStyle = noseColor;
      ctx.beginPath();
      ctx.ellipse(noseX, noseY, headR * 0.28, headR * 0.2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#b65570';
      ctx.beginPath(); ctx.arc(noseX - headR * 0.09, noseY, headR * 0.045, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(noseX + headR * 0.09, noseY, headR * 0.045, 0, Math.PI * 2); ctx.fill();
    } else if (accent === 'cow_spots') {
      ctx.fillStyle = noseColor;
      ctx.beginPath();
      ctx.ellipse(noseX, noseY, headR * 0.32, headR * 0.22, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#b65570';
      ctx.beginPath(); ctx.arc(noseX - headR * 0.1, noseY, headR * 0.04, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(noseX + headR * 0.1, noseY, headR * 0.04, 0, Math.PI * 2); ctx.fill();
    } else {
      // rounded triangular nose
      ctx.fillStyle = noseColor;
      ctx.beginPath();
      ctx.moveTo(noseX - headR * 0.11, noseY - headR * 0.05);
      ctx.quadraticCurveTo(noseX, noseY - headR * 0.1, noseX + headR * 0.11, noseY - headR * 0.05);
      ctx.quadraticCurveTo(noseX + headR * 0.09, noseY + headR * 0.08, noseX, noseY + headR * 0.09);
      ctx.quadraticCurveTo(noseX - headR * 0.09, noseY + headR * 0.08, noseX - headR * 0.11, noseY - headR * 0.05);
      ctx.closePath();
      ctx.fill();
      // highlight
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.ellipse(noseX - headR * 0.03, noseY - headR * 0.03, headR * 0.03, headR * 0.02, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Mouth (line down + smile)
    if (accent !== 'pig_nose' && accent !== 'cow_spots') {
      ctx.strokeStyle = '#3a2418';
      ctx.lineWidth = Math.max(1.8, headR * 0.035);
      ctx.lineCap = 'round';
      // vertical from nose
      ctx.beginPath();
      ctx.moveTo(cx, noseY + headR * 0.09);
      ctx.lineTo(cx, hy + headR * 0.42);
      ctx.stroke();
      // left smile
      ctx.beginPath();
      ctx.moveTo(cx, hy + headR * 0.42);
      ctx.quadraticCurveTo(cx - headR * 0.12, hy + headR * 0.52, cx - headR * 0.22, hy + headR * 0.44);
      ctx.stroke();
      // right smile
      ctx.beginPath();
      ctx.moveTo(cx, hy + headR * 0.42);
      ctx.quadraticCurveTo(cx + headR * 0.12, hy + headR * 0.52, cx + headR * 0.22, hy + headR * 0.44);
      ctx.stroke();
    } else {
      ctx.strokeStyle = '#3a2418';
      ctx.lineWidth = headR * 0.03;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(cx, noseY + headR * 0.2, headR * 0.13, 0.25, Math.PI - 0.25);
      ctx.stroke();
    }

    // ===== Fur texture (soft strokes at edges) =====
    if (accent !== 'panda_eye' && accent !== 'cow_spots') {
      ctx.strokeStyle = shade(animal.body, -0.3);
      ctx.lineWidth = Math.max(1, Math.min(w, h) * 0.003);
      ctx.lineCap = 'round';
      let s = 4729;
      const rnd = () => { s = (s * 9301 + 49297) % 233280; return s / 233280; };
      // body edge fur
      for (let i = 0; i < 26; i++) {
        const a = rnd() * Math.PI * 2;
        const r = bodyR * (0.92 + rnd() * 0.18);
        const x1 = cx + Math.cos(a) * r;
        const y1 = cy + Math.sin(a) * r * 0.88;
        const len = bodyR * (0.06 + rnd() * 0.05);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x1 + Math.cos(a) * len, y1 + Math.sin(a) * len);
        ctx.stroke();
      }
      // head edge fur
      for (let i = 0; i < 14; i++) {
        const a = rnd() * Math.PI * 2;
        const r = headR * (0.95 + rnd() * 0.12);
        const x1 = cx + Math.cos(a) * r;
        const y1 = hy + Math.sin(a) * r;
        const len = headR * (0.06 + rnd() * 0.05);
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x1 + Math.cos(a) * len, y1 + Math.sin(a) * len);
        ctx.stroke();
      }
    }

    // Decorative flower (skip rabbit with long ears)
    if (ear !== 'long') {
      const fx = cx - headR * 0.72;
      const fy = hy - headR * 0.78;
      ctx.fillStyle = '#ffd6e3';
      for (let k = 0; k < 5; k++) {
        const a = (k / 5) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(fx + Math.cos(a) * headR * 0.1, fy + Math.sin(a) * headR * 0.1, headR * 0.08, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#ffde59';
      ctx.beginPath();
      ctx.arc(fx, fy, headR * 0.06, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
    return { cx, cy, bodyR, hy, headR };
  }

  // Draw fur mess layer onto a separate canvas
  function drawFurLayer(ctx, w, h, animal, geom) {
    const { cx, cy, bodyR, hy, headR } = geom;
    ctx.save();
    ctx.fillStyle = animal.furColor;

    // clip to a region that covers body+head so fur stays on the animal-ish area
    // Actually we want fur to look messy and go beyond - so draw big puffs around body/head
    const puffCount = 260;
    for (let i = 0; i < puffCount; i++) {
      // Random position clustered around head+body
      let x, y, r;
      if (Math.random() < 0.45) {
        // head
        const a = Math.random() * Math.PI * 2;
        const rr = Math.random() * headR * 1.25;
        x = cx + Math.cos(a) * rr;
        y = hy + Math.sin(a) * rr * 0.95;
      } else {
        // body
        const a = Math.random() * Math.PI * 2;
        const rr = Math.random() * bodyR * 1.15;
        x = cx + Math.cos(a) * rr * 1.05;
        y = cy + Math.sin(a) * rr * 0.95;
      }
      r = (Math.random() * 0.35 + 0.25) * Math.min(headR, bodyR) * 0.5;
      const alpha = 0.55 + Math.random() * 0.35;
      ctx.globalAlpha = alpha;
      // slight color variation
      ctx.fillStyle = animal.furColor;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    // darker outline puffs for texture
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = '#4a2f18';
    for (let i = 0; i < 40; i++) {
      const a = Math.random() * Math.PI * 2;
      const rr = Math.random() * bodyR * 1.1;
      const x = cx + Math.cos(a) * rr;
      const y = cy + Math.sin(a) * rr * 0.9;
      const r = Math.random() * 8 + 3;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }

  // ========= Game state =========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const stage = document.getElementById('stage');
  const timerFill = document.getElementById('timerFill');
  const progressText = document.getElementById('progressText');
  const goalThumb = document.getElementById('goalThumb');

  let furCanvas, furCtx;      // offscreen canvas containing messy fur
  let cleanCanvas, cleanCtx;  // offscreen containing the clean animal
  let geom = null;
  let totalFurPixels = 0;
  let erasedPixels = 0;
  let currentAnimal = null;
  let timeLeft = 0;
  let gameDuration = 30; // seconds
  let running = false;
  let rafId = null;
  let lastTs = 0;

  function sizeCanvas() {
    const rect = stage.getBoundingClientRect();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(rect.width * dpr);
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
  }

  function setupGameCanvases(animal) {
    sizeCanvas();
    const w = canvas.width, h = canvas.height;

    // clean canvas (background)
    cleanCanvas = document.createElement('canvas');
    cleanCanvas.width = w; cleanCanvas.height = h;
    cleanCtx = cleanCanvas.getContext('2d');
    geom = drawCleanAnimal(cleanCtx, w, h, animal);

    // fur canvas (on top layer)
    furCanvas = document.createElement('canvas');
    furCanvas.width = w; furCanvas.height = h;
    furCtx = furCanvas.getContext('2d');
    drawFurLayer(furCtx, w, h, animal, geom);

    // Count opaque pixels once for progress measure (sampled for speed)
    const imgData = furCtx.getImageData(0, 0, w, h).data;
    let count = 0;
    const step = 16; // sample every 16 pixels
    for (let i = 3; i < imgData.length; i += 4 * step) {
      if (imgData[i] > 20) count++;
    }
    totalFurPixels = count;
    erasedPixels = 0;

    compose();
  }

  function compose() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(cleanCanvas, 0, 0);
    ctx.drawImage(furCanvas, 0, 0);
  }

  function computeProgress() {
    // Sample fur canvas to estimate remaining fur
    const w = furCanvas.width, h = furCanvas.height;
    const imgData = furCtx.getImageData(0, 0, w, h).data;
    let remaining = 0;
    const step = 16;
    for (let i = 3; i < imgData.length; i += 4 * step) {
      if (imgData[i] > 20) remaining++;
    }
    const cleanedRatio = totalFurPixels > 0
      ? Math.max(0, Math.min(1, 1 - remaining / totalFurPixels))
      : 0;
    return cleanedRatio;
  }

  // Erase fur on swipe
  function eraseAt(x, y) {
    // Convert CSS coords to canvas coords
    const rect = canvas.getBoundingClientRect();
    const scaleX = furCanvas.width / rect.width;
    const scaleY = furCanvas.height / rect.height;
    const cx = (x - rect.left) * scaleX;
    const cy = (y - rect.top) * scaleY;

    const radius = Math.min(furCanvas.width, furCanvas.height) * 0.06;
    furCtx.save();
    furCtx.globalCompositeOperation = 'destination-out';
    furCtx.beginPath();
    furCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    furCtx.fill();
    furCtx.restore();
  }

  function sparkleAt(clientX, clientY) {
    const stageRect = stage.getBoundingClientRect();
    const x = clientX - stageRect.left;
    const y = clientY - stageRect.top;
    const emojis = ['✨','⭐','💖','🌟'];
    const s = document.createElement('div');
    s.className = 'sparkle-burst';
    s.textContent = emojis[(Math.random()*emojis.length)|0];
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    const ang = Math.random() * Math.PI * 2;
    const dist = 30 + Math.random() * 30;
    s.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
    s.style.setProperty('--dy', (Math.sin(ang) * dist - 20) + 'px');
    stage.appendChild(s);
    setTimeout(() => s.remove(), 700);
  }

  // Pointer handling
  let pointerDown = false;
  let lastX = 0, lastY = 0;
  let lastBuzz = 0;
  let lastSparkle = 0;

  function onPointerDown(e) {
    if (!running) return;
    pointerDown = true;
    canvas.classList.add('swiping');
    ensureAudio();
    const p = getPoint(e);
    lastX = p.x; lastY = p.y;
    handleMove(p);
    e.preventDefault();
  }
  function onPointerMove(e) {
    if (!running || !pointerDown) return;
    const p = getPoint(e);
    // interpolate between lastX,lastY and p for smoother strokes
    const dx = p.x - lastX, dy = p.y - lastY;
    const dist = Math.hypot(dx, dy);
    const steps = Math.max(1, Math.floor(dist / 8));
    for (let i = 1; i <= steps; i++) {
      const ix = lastX + (dx * i) / steps;
      const iy = lastY + (dy * i) / steps;
      eraseAt(ix, iy);
    }
    handleMove(p);
    lastX = p.x; lastY = p.y;
    e.preventDefault();
  }
  function onPointerUp() {
    pointerDown = false;
    canvas.classList.remove('swiping');
  }
  function handleMove(p) {
    const now = performance.now();
    if (now - lastBuzz > 50) {
      playBuzz(0.04);
      vibrate(12);
      lastBuzz = now;
    }
    if (now - lastSparkle > 60) {
      sparkleAt(p.clientX, p.clientY);
      lastSparkle = now;
    }
    compose();
  }
  function getPoint(e) {
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX, y: t.clientY, clientX: t.clientX, clientY: t.clientY };
  }

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  window.addEventListener('touchend', onPointerUp);
  window.addEventListener('touchcancel', onPointerUp);

  // ========= Game loop =========
  function startGame(animal) {
    currentAnimal = animal;
    goalThumb.textContent = animal.emoji;
    showScene('play');
    // wait a frame so the canvas has size
    requestAnimationFrame(() => {
      setupGameCanvases(animal);
      showCountdown(() => {
        running = true;
        timeLeft = gameDuration;
        lastTs = performance.now();
        tick();
      });
    });
  }

  function showCountdown(done) {
    const stageEl = stage;
    const overlay = document.createElement('div');
    overlay.className = 'countdown';
    stageEl.appendChild(overlay);
    const seq = ['3','2','1','スタート！'];
    let i = 0;
    function next() {
      if (i >= seq.length) {
        overlay.remove();
        done();
        return;
      }
      overlay.textContent = seq[i];
      overlay.style.animation = 'none';
      overlay.offsetHeight;
      overlay.style.animation = '';
      playDing(i === seq.length - 1 ? 1046 : 660);
      i++;
      setTimeout(next, 600);
    }
    next();
  }

  function tick() {
    if (!running) return;
    const now = performance.now();
    const dt = (now - lastTs) / 1000;
    lastTs = now;
    timeLeft -= dt;

    // update progress every ~200ms
    if (!tick._pAcc || now - tick._pAcc > 200) {
      tick._pAcc = now;
      const r = computeProgress();
      progressText.textContent = Math.round(r * 100) + '%';
      const pct = Math.max(0, Math.min(1, timeLeft / gameDuration));
      timerFill.style.width = (pct * 100) + '%';
      timerFill.style.backgroundPosition = ((1 - pct) * 100) + '% 0%';
      if (r >= 0.95) {
        running = false;
        endGame(true);
        return;
      }
    }

    if (timeLeft <= 0) {
      running = false;
      endGame(false);
      return;
    }
    rafId = requestAnimationFrame(tick);
  }

  function endGame(clearedEarly = false) {
    cancelAnimationFrame(rafId);
    const r = computeProgress();
    const pct = Math.round(r * 100);

    // draw the current state to the result canvas
    const resCanvas = document.getElementById('resultCanvas');
    resCanvas.width = canvas.width;
    resCanvas.height = canvas.height;
    const rctx = resCanvas.getContext('2d');
    rctx.drawImage(cleanCanvas, 0, 0);
    rctx.drawImage(furCanvas, 0, 0);

    // title by score
    const title = document.getElementById('resultTitle');
    const scoreBadge = document.getElementById('scoreBadge');
    scoreBadge.textContent = 'きれいさ ' + pct + '%';
    if (clearedEarly || pct >= 95) {
      title.textContent = 'ぜんぶ ピカピカ！すごい！';
      playFanfare();
    } else if (pct >= 80) {
      title.textContent = 'たいへん よくできました！';
      playFanfare();
    } else if (pct >= 50) {
      title.textContent = 'じょうず！';
      playDing(784); setTimeout(()=>playDing(1046), 150);
    } else {
      title.textContent = 'もうちょっと！';
      playDing(523);
    }

    // stars overlay
    const stars = document.getElementById('starsLayer');
    stars.innerHTML = '';
    for (let i = 0; i < 14; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.textContent = ['✨','⭐','💖','🌟'][i % 4];
      s.style.left = (Math.random() * 90 + 2) + '%';
      s.style.top = (Math.random() * 90 + 2) + '%';
      s.style.animationDelay = (Math.random() * 1.5) + 's';
      stars.appendChild(s);
    }

    showScene('result');
  }

  // Resize handling
  let resizeTimer = null;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      if (scenes.play.classList.contains('active') && currentAnimal) {
        // simple approach: redo canvases (loses current erase state — acceptable for demo)
        setupGameCanvases(currentAnimal);
      }
    }, 150);
  });

  // Prevent scrolling on iOS
  document.addEventListener('touchmove', (e) => {
    if (scenes.play.classList.contains('active')) e.preventDefault();
  }, { passive: false });

})();
</script>
</body>
